# Application Name
spring.application.name=court-booking-system

# Server Configuration
server.port=${PORT:8080}

# MySQL Database Configuration
# Values come from environment variables (set in docker-compose.yml or cloud platform)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/court_booking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:akid12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Logging Configuration
logging.level.org.hibernate.SQL=WARN
logging.level.com.courtbooking=INFO

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# JWT Configuration
jwt.secret=${JWT_SECRET:Y291cnQtYm9va2luZy1zZWNyZXQta2V5LWNoYW5nZS10aGlzLWluLXByb2R1Y3Rpb24tbWluaW11bS0yNTYtYml0cy1yZXF1aXJlZC1mb3ItaHMyNTYtYWxnb3JpdGht}
jwt.expiration=${JWT_EXPIRATION:86400000}
