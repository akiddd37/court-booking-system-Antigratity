<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Bookings - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">
          <h1>🎾 Court Booking - Admin</h1>
        </div>
        <ul class="nav-menu" id="navMenu">
          <li><a href="index.html">Courts</a></li>
          <!-- Dynamic menu items will be inserted here -->
        </ul>
      </div>
    </nav>

    <!-- Admin Bookings Section -->
    <section class="admin-section">
      <div class="container">
        <div class="admin-header">
          <h2>📅 All Bookings</h2>
          <div class="filter-controls">
            <select id="statusFilter" class="filter-select">
              <option value="all">All Statuses</option>
              <option value="PENDING">Pending</option>
              <option value="CONFIRMED">Confirmed</option>
              <option value="CANCELLED">Cancelled</option>
              <option value="COMPLETED">Completed</option>
            </select>
          </div>
        </div>

        <div id="loading" class="loading" style="display: none">
          <div class="spinner"></div>
          <p>Loading bookings...</p>
        </div>

        <div id="error" class="error-message" style="display: none"></div>

        <!-- Bookings Container -->
        <div id="bookingsContainer">
          <!-- Bookings will be inserted here -->
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>
          &copy; 2026 Court Booking System. Built with Spring Boot & Vanilla JS.
        </p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/admin-bookings.js"></script>
  </body>
</html>
