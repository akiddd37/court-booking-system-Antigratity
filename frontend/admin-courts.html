<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Courts - Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">
          <h1>🎾 Court Booking - Admin</h1>
        </div>
        <ul class="nav-menu" id="navMenu">
          <li><a href="index.html">Courts</a></li>
          <!-- Dynamic menu items will be inserted here -->
        </ul>
      </div>
    </nav>

    <!-- Admin Courts Section -->
    <section class="admin-section">
      <div class="container">
        <div class="admin-header">
          <h2>🏟️ Manage Courts</h2>
          <button class="btn btn-primary" onclick="showCreateModal()">
            + Add New Court
          </button>
        </div>

        <div id="loading" class="loading" style="display: none">
          <div class="spinner"></div>
          <p>Loading courts...</p>
        </div>

        <div id="error" class="error-message" style="display: none"></div>

        <!-- Courts Table -->
        <div class="table-container">
          <table class="admin-table" id="courtsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Court Name</th>
                <th>Type</th>
                <th>Hourly Rate</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="courtsTableBody">
              <!-- Courts will be inserted here -->
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Create/Edit Modal -->
    <div id="courtModal" class="modal" style="display: none">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modalTitle">Add New Court</h3>
          <span class="close" onclick="closeModal()">&times;</span>
        </div>

        <form id="courtForm">
          <input type="hidden" id="courtId" />

          <div class="form-group">
            <label for="courtName">Court Name *</label>
            <input
              type="text"
              id="courtName"
              required
              placeholder="e.g., Court A1"
            />
          </div>

          <div class="form-group">
            <label for="courtType">Court Type *</label>
            <select id="courtType" required>
              <option value="">-- Select Type --</option>
              <option value="BADMINTON">🏸 Badminton</option>
              <option value="TENNIS">🎾 Tennis</option>
              <option value="BASKETBALL">🏀 Basketball</option>
            </select>
          </div>

          <div class="form-group">
            <label for="hourlyRate">Hourly Rate (RM) *</label>
            <input
              type="number"
              id="hourlyRate"
              required
              min="0"
              step="0.01"
              placeholder="50.00"
            />
          </div>

          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" id="isActive" checked />
              Active (available for booking)
            </label>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary" id="submitBtn">
              Save Court
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>
          &copy; 2026 Court Booking System. Built with Spring Boot & Vanilla JS.
        </p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/admin-courts.js"></script>
  </body>
</html>
