<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Court Booking System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">
          <h1>🎾 Court Booking</h1>
        </div>
        <ul class="nav-menu">
          <li><a href="index.html">Courts</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </div>
    </nav>

    <!-- Register Section -->
    <section class="booking-section">
      <div class="container">
        <div class="booking-card">
          <h2>Create Account</h2>
          <p class="subtitle">Join us to start booking courts</p>

          <div id="error" class="error-message" style="display: none"></div>

          <form id="registerForm">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input
                type="text"
                id="fullName"
                name="fullName"
                required
                placeholder="John Doe"
                autocomplete="name"
              />
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="your.email@example.com"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="phoneNumber">Phone Number</label>
              <input
                type="tel"
                id="phoneNumber"
                name="phoneNumber"
                required
                placeholder="+60123456789"
                autocomplete="tel"
              />
              <small>Format: +60123456789</small>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="Minimum 6 characters"
                autocomplete="new-password"
                minlength="6"
              />
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                required
                placeholder="Re-enter your password"
                autocomplete="new-password"
                minlength="6"
              />
            </div>

            <button type="submit" class="btn btn-primary" id="registerBtn" style="width: 100%">
              Create Account
            </button>
          </form>

          <div style="text-align: center; margin-top: 1.5rem">
            <p style="color: var(--text-light)">
              Already have an account?
              <a href="login.html" style="color: var(--primary-color); font-weight: 600">
                Login here
              </a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>
          &copy; 2026 Court Booking System. Built with Spring Boot & Vanilla JS.
        </p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
