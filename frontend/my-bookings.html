<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Court Booking System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🎾 Court Booking</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Courts</a></li>
                <li><a href="my-bookings.html" class="active">My Bookings</a></li>
            </ul>
        </div>
    </nav>

    <!-- My Bookings Section -->
    <section class="bookings-section">
        <div class="container">
            <div class="section-header">
                <h2>📋 My Bookings</h2>
                <div class="user-selector">
                    <label for="userIdSelect">User ID:</label>
                    <input type="number" id="userIdSelect" value="1" min="1">
                    <button onclick="loadBookings()" class="btn btn-small">Load</button>
                </div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading bookings...</p>
            </div>

            <div id="error" class="error-message" style="display: none;"></div>

            <div id="bookings-container"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Court Booking System. Built with Spring Boot & Vanilla JS.</p>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/my-bookings.js"></script>
</body>
</html>
