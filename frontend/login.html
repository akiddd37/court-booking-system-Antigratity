<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Court Booking System</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">
          <h1>🎾 Court Booking</h1>
        </div>
        <ul class="nav-menu">
          <li><a href="index.html">Courts</a></li>
          <li><a href="register.html">Register</a></li>
        </ul>
      </div>
    </nav>

    <!-- Login Section -->
    <section class="booking-section">
      <div class="container">
        <div class="booking-card">
          <h2>Welcome Back!</h2>
          <p class="subtitle">Login to book your favorite courts</p>

          <div id="error" class="error-message" style="display: none"></div>

          <form id="loginForm">
            <div class="form-group">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="your.email@example.com"
                autocomplete="email"
              />
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="Enter your password"
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%">
              Login
            </button>
          </form>

          <div style="text-align: center; margin-top: 1.5rem">
            <p style="color: var(--text-light)">
              Don't have an account?
              <a href="register.html" style="color: var(--primary-color); font-weight: 600">
                Register here
              </a>
            </p>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p>
          &copy; 2026 Court Booking System. Built with Spring Boot & Vanilla JS.
        </p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
